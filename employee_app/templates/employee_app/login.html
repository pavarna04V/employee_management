<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .box{
            width:400px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:20px;
            background:blue;
            color:white;
            border:none;
        }

        a{
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>Employee Management Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">

        <button type="submit">Login</button>
    </form>

    <br>

    <a href="/register/">Create Account</a>

</div>

</body>
</html>
