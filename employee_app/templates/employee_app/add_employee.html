{% extends 'employee_app/base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-3">Add Employee</h2>

    <!-- SUCCESS / ERROR MESSAGES -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <input type="text" name="name" placeholder="Employee Name" class="form-control" required>
        </div>

        <div class="mb-3">
            <input type="email" name="email" placeholder="Email" class="form-control" required>
        </div>

        <div class="mb-3">
            <input type="text" name="phone" placeholder="Phone" class="form-control" required>
        </div>

        <div class="mb-3">
            <input type="number" name="salary" placeholder="Salary" class="form-control" required>
        </div>

        <div class="mb-3">
            <select name="department" class="form-control" required>
                <option value="">Select Department</option>

                {% for department in departments %}
                    <option value="{{ department.id }}">
                        {{ department.name }}
                    </option>
                {% endfor %}

            </select>
        </div>

        <button type="submit" class="btn btn-primary">
            Add Employee
        </button>

    </form>

</div>

{% endblock %}
