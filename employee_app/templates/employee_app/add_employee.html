{% extends 'employee_app/base.html' %}

{% block content %}

<h2>Add Employee</h2>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="name"
        placeholder="Employee Name"
        required
    >

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <br><br>

    <input
        type="text"
        name="phone"
        placeholder="Phone"
        required
    >

    <br><br>

    <input
        type="number"
        name="salary"
        placeholder="Salary"
        required
    >

    <br><br>

    <select name="department" required>

        <option value="">
            Select Department
        </option>

        {% for department in departments %}

        <option value="{{ department.id }}">
            {{ department.name }}
        </option>

        {% endfor %}

    </select>

    <br><br>

    <button type="submit">
        Add Employee
    </button>

</form>

{% endblock %}
